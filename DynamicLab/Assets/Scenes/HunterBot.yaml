behaviors:
  HunterBot:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
      memory:
        sequence_length: 64 # LSTM: Remembers the player's last seen position
        memory_size: 128
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      rnd: # Curiosity: Rewards exploring the 100x100 maze
        gamma: 0.99
        strength: 0.01
        network_settings:
          hidden_units: 64
    max_steps: 1000000
    time_horizon: 128
    summary_freq: 10000